<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 10 Study Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📚 Class 10 Study Hub</h1>
<p class="tag">Quick Revision For Class 10</p>
</header>

<div class="controls">

<select id="subject">
<option value="maths">Maths</option>
<option value="science">Science</option>
<option value="sst">Social Science</option>
<option value="hindi">Hindi</option>
<option value="sanskrit">Sanskrit</option>
</select>

<select id="language">
<option value="hindi">Hindi</option>
<option value="hinglish">Hinglish</option>
<option value="english">English</option>
</select>

</div>

<input id="search" placeholder="Search question...">

<div id="questions"></div>

<button id="moreBtn">Load More</button>

<script src="questions.js"></script>
<script src="script.js"></script>
<div class="quiz-fab" onclick="startQuiz()">
🧠
<span>Start Quiz</span>
</div>
</body>
</html>
